<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Zoophiloo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a9e6e;
    --green-dark: #0f7a52;
    --green-light: #e6f7f0;
    --orange: #e8622a;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: #e8e8e4;
    --bg: #fafaf8;
    --white: #ffffff;
    --error: #c0392b;
    --error-bg: #fdf0ee;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .logo { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: -0.5px; text-decoration: none; }
  .logo .z { color: var(--green); }
  .logo .rest { color: var(--text); }

  /* MAIN */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  .auth-container {
    width: 100%;
    max-width: 420px;
  }

  .auth-header {
    text-align: center;
    margin-bottom: 32px;
  }
  .auth-header h1 {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  .auth-header p {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* TABS */
  .auth-tabs {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 24px;
    gap: 4px;
  }
  .auth-tab {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 7px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .auth-tab.active {
    background: var(--white);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  /* CARD */
  .auth-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.05);
  }

  /* FORM */
  .form-group {
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 5px;
    letter-spacing: 0.01em;
  }
  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(26,158,110,0.10);
  }
  input.error-input {
    border-color: var(--error);
    box-shadow: 0 0 0 3px rgba(192,57,43,0.08);
  }

  /* FORGOT */
  .forgot-link {
    float: right;
    font-size: 11px;
    color: var(--text-muted);
    text-decoration: none;
    margin-top: -20px;
    margin-bottom: 16px;
    display: block;
    text-align: right;
    cursor: pointer;
  }
  .forgot-link:hover { color: var(--green); }

  /* BUTTONS */
  .btn-submit {
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: 8px;
    background: var(--green);
    color: white;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
  }
  .btn-submit:hover { background: var(--green-dark); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

  /* DIVIDER */
  .or-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: var(--text-muted);
    font-size: 12px;
  }
  .or-divider::before, .or-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* GOOGLE BUTTON */
  .btn-google {
    width: 100%;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--white);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn-google:hover {
    border-color: #aaa;
    background: var(--bg);
  }
  .btn-google svg { flex-shrink: 0; }

  /* ALERTS */
  .alert {
    display: none;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    line-height: 1.4;
  }
  .alert.show { display: flex; align-items: flex-start; gap: 8px; }
  .alert-error { background: var(--error-bg); color: var(--error); border: 1px solid rgba(192,57,43,0.2); }
  .alert-success { background: var(--green-light); color: var(--green-dark); border: 1px solid rgba(26,158,110,0.25); }

  /* SPINNER */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-submit.loading .spinner { display: block; }
  .btn-submit.loading .btn-label { display: none; }

  /* TERMS */
  .terms-note {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 16px;
    line-height: 1.5;
  }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: block; }

  /* RESET PANEL */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: none;
    cursor: pointer;
    margin-bottom: 20px;
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--green); }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 20px 16px 32px;
    font-size: 12px;
    color: var(--text-muted);
  }
  footer a { color: var(--green); text-decoration: none; }

  /* RESPONSIVE */
  @media (max-width: 480px) {
    .auth-card { padding: 20px 16px; }
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo"><span class="z">Zoo</span><span class="rest">philoo</span></a>
</header>

<main>
  <div class="auth-container">

    <!-- Header -->
    <div class="auth-header">
      <h1>Bienvenue 🐾</h1>
      <p>Connectez-vous pour gérer vos annonces</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabSignin" onclick="showPanel('signin')">Se connecter</button>
      <button class="auth-tab" id="tabSignup" onclick="showPanel('signup')">Créer un compte</button>
    </div>

    <div class="auth-card">

      <!-- ── SIGN IN ── -->
      <div class="panel active" id="panelSignin">
        <div class="alert alert-error" id="signinError">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="signinErrorMsg"></span>
        </div>
        <div class="form-group">
          <label>Adresse e-mail</label>
          <input type="email" id="signinEmail" placeholder="vous@exemple.fr" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" id="signinPassword" placeholder="••••••••" autocomplete="current-password">
        </div>
        <a class="forgot-link" onclick="showPanel('reset')">Mot de passe oublié ?</a>
        <button class="btn-submit" id="btnSignin" onclick="doSignIn()">
          <div class="spinner"></div>
          <span class="btn-label">Se connecter</span>
        </button>
        <div class="or-divider">ou</div>
        <button class="btn-google" onclick="doGoogleSignIn()">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continuer avec Google
        </button>
      </div>

      <!-- ── SIGN UP ── -->
      <div class="panel" id="panelSignup">
        <div class="alert alert-error" id="signupError">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="signupErrorMsg"></span>
        </div>
        <div class="alert alert-success" id="signupSuccess">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><polyline points="20 6 9 17 4 12"/></svg>
          <span id="signupSuccessMsg"></span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
          <div class="form-group" style="margin-bottom:0">
            <label>Prénom <span style="color:var(--green)">*</span></label>
            <input type="text" id="signupPrenom" placeholder="Votre prénom" autocomplete="given-name">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label>Nom <span style="color:var(--green)">*</span></label>
            <input type="text" id="signupNom" placeholder="Votre nom" autocomplete="family-name">
          </div>
        </div>
        <div class="form-group">
          <label>Adresse e-mail</label>
          <input type="email" id="signupEmail" placeholder="vous@exemple.fr" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" id="signupPassword" placeholder="8 caractères minimum" autocomplete="new-password">
        </div>
        <button class="btn-submit" id="btnSignup" onclick="doSignUp()">
          <div class="spinner"></div>
          <span class="btn-label">Créer mon compte</span>
        </button>
        <div class="or-divider">ou</div>
        <button class="btn-google" onclick="doGoogleSignIn()">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continuer avec Google
        </button>
        <p class="terms-note">En créant un compte, vous acceptez nos conditions d'utilisation.</p>
      </div>

      <!-- ── RESET PASSWORD ── -->
      <div class="panel" id="panelReset">
        <a class="back-link" onclick="showPanel('signin')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Retour
        </a>
        <div style="margin-bottom:18px">
          <div style="font-family:var(--font-display);font-size:17px;font-weight:600;margin-bottom:5px">Mot de passe oublié</div>
          <div style="font-size:13px;color:var(--text-muted);line-height:1.5">Entrez votre adresse e-mail et nous vous enverrons un lien de réinitialisation.</div>
        </div>
        <div class="alert alert-error" id="resetError">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="resetErrorMsg"></span>
        </div>
        <div class="alert alert-success" id="resetSuccess">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><polyline points="20 6 9 17 4 12"/></svg>
          <span id="resetSuccessMsg"></span>
        </div>
        <div class="form-group">
          <label>Adresse e-mail</label>
          <input type="email" id="resetEmail" placeholder="vous@exemple.fr">
        </div>
        <button class="btn-submit" id="btnReset" onclick="doResetPassword()">
          <div class="spinner"></div>
          <span class="btn-label">Envoyer le lien</span>
        </button>
      </div>

    </div><!-- /auth-card -->
  </div><!-- /auth-container -->
</main>

<footer>
  <a href="index.html">← Retour aux annonces</a>
</footer>

<!-- Firebase SDK (compat v9) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
// ─────────────────────────────────────────────
// 🔧 REMPLACEZ ces valeurs par celles de votre
//    projet Firebase (étapes  dans le README ci-dessous)
// ─────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "__FIREBASE_API_KEY__",
  authDomain:        "__FIREBASE_AUTH_DOMAIN__",
  projectId:         "__FIREBASE_PROJECT_ID__",
  storageBucket:     "__FIREBASE_STORAGE_BUCKET__",
  messagingSenderId: "__FIREBASE_MESSAGING_SENDER_ID__",
  appId:             "__FIREBASE_APP_ID__"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function redirectAfterLogin() {
  const next = new URLSearchParams(window.location.search).get('next');
  window.location.href = (next && /^[a-z\-]+\.html$/.test(next)) ? next : 'index.html';
}

// ── Redirect if already logged in ──
auth.onAuthStateChanged(user => {
  if (user) redirectAfterLogin();
});

// ── Panel switcher ──
function showPanel(name) {
  ['signin','signup','reset'].forEach(p => {
    document.getElementById('panel' + p.charAt(0).toUpperCase() + p.slice(1)).classList.remove('active');
    const tab = document.getElementById('tab' + p.charAt(0).toUpperCase() + p.slice(1));
    if (tab) tab.classList.remove('active');
  });
  document.getElementById('panel' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  const tab = document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1));
  if (tab) tab.classList.add('active');
  clearAlerts();
}

function clearAlerts() {
  document.querySelectorAll('.alert').forEach(a => a.classList.remove('show'));
  document.querySelectorAll('input').forEach(i => i.classList.remove('error-input'));
}

function showError(prefix, msg) {
  const el = document.getElementById(prefix + 'Error');
  const msgEl = document.getElementById(prefix + 'ErrorMsg');
  if (el && msgEl) { msgEl.textContent = msg; el.classList.add('show'); }
}
function showSuccess(prefix, msg) {
  const el = document.getElementById(prefix + 'Success');
  const msgEl = document.getElementById(prefix + 'SuccessMsg');
  if (el && msgEl) { msgEl.textContent = msg; el.classList.add('show'); }
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = loading;
  btn.classList.toggle('loading', loading);
}

function firebaseError(code) {
  const map = {
    'auth/user-not-found':        'Aucun compte associé à cet e-mail.',
    'auth/wrong-password':        'Mot de passe incorrect.',
    'auth/invalid-credential':    'E-mail ou mot de passe invalide.',
    'auth/email-already-in-use':  'Un compte existe déjà avec cet e-mail.',
    'auth/weak-password':         'Le mot de passe doit contenir au moins 8 caractères.',
    'auth/invalid-email':         'L\'adresse e-mail est invalide.',
    'auth/too-many-requests':     'Trop de tentatives. Réessayez dans quelques minutes.',
    'auth/network-request-failed':'Erreur réseau. Vérifiez votre connexion.',
    'auth/popup-closed-by-user':  'Connexion annulée.',
  };
  return map[code] || 'Une erreur est survenue. Réessayez.';
}

// ── Sign In ──
async function doSignIn() {
  clearAlerts();
  const email = document.getElementById('signinEmail').value.trim();
  const password = document.getElementById('signinPassword').value;
  if (!email) { showError('signin', 'Entrez votre adresse e-mail.'); return; }
  if (!password) { showError('signin', 'Entrez votre mot de passe.'); return; }
  setLoading('btnSignin', true);
  try {
    await auth.signInWithEmailAndPassword(email, password);
    redirectAfterLogin();
  } catch(e) {
    showError('signin', firebaseError(e.code));
    setLoading('btnSignin', false);
  }
}

// ── Sign Up ──
async function doSignUp() {
  clearAlerts();
  const prenom   = document.getElementById('signupPrenom').value.trim();
  const nom      = document.getElementById('signupNom').value.trim();
  const email    = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  if (!prenom) { showError('signup', 'Le prénom est obligatoire.'); return; }
  if (!nom)    { showError('signup', 'Le nom est obligatoire.'); return; }
  if (!email)  { showError('signup', 'Entrez votre adresse e-mail.'); return; }
  if (password.length < 8) { showError('signup', 'Le mot de passe doit contenir au moins 8 caractères.'); return; }
  setLoading('btnSignup', true);
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, password);
    const displayName = [prenom, nom].filter(Boolean).join(' ');
    await cred.user.updateProfile({ displayName });
    // Sauvegarde locale pour pré-remplissage des formulaires d'annonce
    localStorage.setItem('zph_prenom', prenom);
    localStorage.setItem('zph_nom',    nom);
    redirectAfterLogin();
  } catch(e) {
    showError('signup', firebaseError(e.code));
    setLoading('btnSignup', false);
  }
}

// ── Google Sign In ──
async function doGoogleSignIn() {
  clearAlerts();
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    const cred = await auth.signInWithPopup(provider);
    // Sauvegarder prénom/nom depuis le displayName Google
    if (cred.user.displayName) {
      const parts = cred.user.displayName.trim().split(/\s+/);
      localStorage.setItem('zph_prenom', parts[0] || '');
      localStorage.setItem('zph_nom',    parts.slice(1).join(' ') || '');
    }
    redirectAfterLogin();
  } catch(e) {
    const panel = document.getElementById('panelSignin').classList.contains('active') ? 'signin' : 'signup';
    showError(panel, firebaseError(e.code));
  }
}

// ── Reset Password ──
async function doResetPassword() {
  clearAlerts();
  const email = document.getElementById('resetEmail').value.trim();
  if (!email) { showError('reset', 'Entrez votre adresse e-mail.'); return; }
  setLoading('btnReset', true);
  try {
    await auth.sendPasswordResetEmail(email);
    showSuccess('reset', 'E-mail envoyé ! Vérifiez votre boîte mail (et les spams).');
    document.getElementById('resetEmail').value = '';
  } catch(e) {
    showError('reset', firebaseError(e.code));
  } finally {
    setLoading('btnReset', false);
  }
}

// ── Enter key shortcuts ──
document.getElementById('signinPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doSignIn(); });
document.getElementById('signinEmail').addEventListener('keydown', e => { if (e.key === 'Enter') doSignIn(); });
document.getElementById('signupPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doSignUp(); });
