<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Migration Airtable → Firestore — YoupiZoo</title>
<meta name="robots" content="noindex, nofollow">
<style>
  body { font-family: monospace; background: #0d1117; color: #c9d1d9; margin: 0; padding: 24px; }
  h1 { color: #58a6ff; font-size: 18px; margin-bottom: 6px; }
  .sub { color: #8b949e; font-size: 13px; margin-bottom: 24px; }
  #btnStart { padding: 10px 24px; background: #1a9e6e; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; margin-bottom: 20px; }
  #btnStart:disabled { opacity: .5; cursor: not-allowed; }
  #log { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; height: 400px; overflow-y: auto; font-size: 12px; line-height: 1.6; }
  .ok  { color: #3fb950; }
  .err { color: #f85149; }
  .inf { color: #79c0ff; }
  .wrn { color: #e3b341; }
  #progress { margin: 12px 0; font-size: 13px; color: #8b949e; }
  .bar-outer { height: 6px; background: #21262d; border-radius: 3px; margin-top: 6px; }
  .bar-inner { height: 100%; background: #1a9e6e; border-radius: 3px; width: 0%; transition: width .3s; }
  #summary { margin-top: 16px; padding: 12px 16px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; display: none; }
  #summary h2 { color: #58a6ff; font-size: 15px; margin-bottom: 8px; }
</style>
</head>
<body>

<h1>🔄 Migration Airtable → Firestore</h1>
<p class="sub">Outil one-shot — réservé admin. Recopie toutes les annonces Airtable vers Firestore et ré-héberge les photos sur imgbb.</p>

<button id="btnStart" onclick="startMigration()">▶ Lancer la migration</button>

<div id="progress">
  <span id="progTxt">En attente…</span>
  <div class="bar-outer"><div class="bar-inner" id="bar"></div></div>
</div>

<div id="log"></div>

<div id="summary">
  <h2>✅ Migration terminée</h2>
  <div id="summaryBody"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey:            "__FIREBASE_API_KEY__",
  authDomain:        "__FIREBASE_AUTH_DOMAIN__",
  projectId:         "__FIREBASE_PROJECT_ID__",
  storageBucket:     "__FIREBASE_STORAGE_BUCKET__",
  messagingSenderId: "__FIREBASE_MESSAGING_SENDER_ID__",
  appId:             "__FIREBASE_APP_ID__"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

const AIRTABLE_TOKEN = '__AIRTABLE_TOKEN__';
const BASE_ID        = 'appepwMYbNUv2k3f9';
const TABLE          = 'Annonces';
const IMGBB_KEY      = '__IMGBB_KEY__';

let _isAdmin = false;

auth.onAuthStateChanged(async user => {
  if (!user) {
    window.location.href = 'login.html?next=migration.html';
    return;
  }
  const snap = await db.collection('users').doc(user.uid).get();
  _isAdmin = snap.exists && snap.data().isAdmin === true;
  if (!_isAdmin) {
    document.body.innerHTML = '<div style="text-align:center;padding:80px 24px;color:#f85149"><h2>🔒 Accès refusé</h2><p>Réservé aux administrateurs.</p></div>';
  }
});

function log(msg, cls = '') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${new Date().toLocaleTimeString('fr-FR')} — ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function setProgress(done, total) {
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progTxt').textContent = `${done} / ${total} annonces (${pct}%)`;
  document.getElementById('bar').style.width = pct + '%';
}

async function fetchAllAirtable() {
  log('📡 Lecture des enregistrements Airtable…', 'inf');
  let records = [], offset = null;
  const fields = [
    'Titre','Description','Espèce','Race','Type_annonce','Prix','Photos',
    'Ville','Adresse','Code_postal','Latitude','Longitude',
    'Email_contact','Nom_contact','Prenom_contact','Telephone',
    'Description','Visible','Statut','Slug','Date_creation','Date_expiration'
  ];
  do {
    const params = new URLSearchParams({ pageSize: 100 });
    fields.forEach(f => params.append('fields[]', f));
    if (offset) params.append('offset', offset);
    const res = await fetch(
      `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE)}?${params}`,
      { headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } }
    );
    const data = await res.json();
    if (!res.ok) throw new Error(`Airtable HTTP ${res.status}: ${data.error?.message || ''}`);
    records = records.concat(data.records || []);
    offset = data.offset || null;
    log(`  ${records.length} enregistrements lus…`, 'inf');
  } while (offset);
  return records;
}

async function reHostPhoto(url) {
  // imgbb accepte une URL directement dans le champ 'image'
  const fd = new FormData();
  fd.append('image', url);
  const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
  const data = await res.json();
  if (!res.ok || !data.success) throw new Error(data.error?.message || `imgbb HTTP ${res.status}`);
  return data.data.url;
}

async function startMigration() {
  if (!_isAdmin) { alert('Accès refusé'); return; }
  const btn = document.getElementById('btnStart');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';

  let stats = { total: 0, migrated: 0, skipped: 0, photoErrors: 0, errors: 0 };

  try {
    const records = await fetchAllAirtable();
    stats.total = records.length;
    log(`✅ ${records.length} annonces récupérées depuis Airtable.`, 'ok');
    setProgress(0, records.length);

    for (let i = 0; i < records.length; i++) {
      const r = records[i];
      const docId = r.id; // recXXXX

      // Vérifier si déjà migré
      const existing = await db.collection('annonces').doc(docId).get();
      if (existing.exists) {
        log(`↩️  [${i+1}/${records.length}] ${r.fields['Titre'] || docId} — déjà migré, ignoré.`, 'wrn');
        stats.skipped++;
        setProgress(i + 1, records.length);
        continue;
      }

      const f = r.fields;
      const firestoreDoc = { ...f, uid: null, _migrated: true, _migratedAt: new Date().toISOString() };

      // Ré-héberger les photos sur imgbb (URL permanentes)
      if (f['Photos'] && f['Photos'].length > 0) {
        const newPhotos = [];
        for (const photo of f['Photos']) {
          if (!photo.url) continue;
          try {
            const newUrl = await reHostPhoto(photo.url);
            newPhotos.push({ url: newUrl });
            log(`  📸 Photo ré-hébergée pour "${f['Titre'] || docId}"`, 'ok');
          } catch(photoErr) {
            log(`  ⚠️ Photo ignorée (${photoErr.message}) — conservation URL Airtable`, 'wrn');
            newPhotos.push({ url: photo.url }); // fallback sur l'URL Airtable
            stats.photoErrors++;
          }
        }
        firestoreDoc['Photos'] = newPhotos;
      }

      // Écrire dans Firestore
      await db.collection('annonces').doc(docId).set(firestoreDoc);
      log(`✅ [${i+1}/${records.length}] "${f['Titre'] || docId}" migré (${docId})`, 'ok');
      stats.migrated++;
      setProgress(i + 1, records.length);

      // Délai pour éviter le rate-limiting imgbb (200ms entre chaque)
      await new Promise(res => setTimeout(res, 200));
    }

    log('', '');
    log(`🎉 Migration terminée !`, 'ok');
    log(`   ✅ Migrés : ${stats.migrated}`, 'ok');
    log(`   ↩️  Ignorés (déjà présents) : ${stats.skipped}`, 'wrn');
    log(`   ⚠️  Erreurs photo (URL Airtable conservée) : ${stats.photoErrors}`, 'wrn');
    log(`   ❌ Erreurs : ${stats.errors}`, stats.errors > 0 ? 'err' : 'ok');

    document.getElementById('summary').style.display = 'block';
    document.getElementById('summaryBody').innerHTML = `
      <p>✅ <strong>${stats.migrated}</strong> annonces migrées vers Firestore.</p>
      <p>↩️ <strong>${stats.skipped}</strong> annonces déjà présentes (ignorées).</p>
      <p>⚠️ <strong>${stats.photoErrors}</strong> photos avec URL Airtable conservée (à re-migrer manuellement si nécessaire).</p>
      <p style="margin-top:12px;color:#8b949e">Vous pouvez maintenant supprimer <code>migration.html</code> du dépôt.</p>
    `;

  } catch(e) {
    log(`❌ ERREUR FATALE : ${e.message}`, 'err');
    stats.errors++;
  }

  btn.disabled = false;
}
</script>
</body>
</html>
